<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felix Wambua | Incoming Senator for Machakos County</title>
    <meta name="description" content="Official campaign website for Felix Wambua, incoming Senator for Machakos County 2027.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        forest: '#0F3D2E',
                        gold: '#D4A017',
                        ivory: '#F8F6F1',
                        charcoal: '#1A1A1A',
                    },
                    fontFamily: {
                        heading: ['Cormorant Garamond', 'serif'],
                        body: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(15, 61, 46, 0.1)',
                        'gold-glow': '0 4px 20px -2px rgba(212, 160, 23, 0.3)'
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS for specific cinematic effects -->
    <style>
        body { background-color: #F8F6F1; color: #1A1A1A; }
        
        .glass-nav {
            background: rgba(248, 246, 241, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(15, 61, 46, 0.05);
            transition: all 0.3s ease;
        }

        .scrolled .glass-nav {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .cinematic-bg {
            background: radial-gradient(circle at top right, rgba(212, 160, 23, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(15, 61, 46, 0.08) 0%, transparent 40%);
        }

        .image-mask {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        .masonry { column-count: 2; column-gap: 1.5rem; }
        @media (min-width: 768px) { .masonry { column-count: 3; } }
        .masonry > div { break-inside: avoid; margin-bottom: 1.5rem; }

        .btn-hover-effect { transition: all 0.3s ease; }
        .btn-hover-effect:hover { transform: translateY(-2px); }

        /* Subtle load animations */
        .fade-up { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .fade-up.visible { opacity: 1; transform: translateY(0); }
    </style>
</head>
